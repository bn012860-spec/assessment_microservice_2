# docker-compose.yml

services:
  # 1. Infrastructure: Redis Cache Service (Uses Alpine - Minimal, No Git)
  redis:
    image: redis:7-alpine
    container_name: codespace_redis
    command: redis-server --appendonly yes
    ports: 
      - "6379:6379"
    volumes:
      - redis_data:/data
    networks:
      - assessment-net

  # 2. Infrastructure: RabbitMQ Message Broker Service
  rabbitmq:
    image: rabbitmq:3-management
    container_name: codespace_rabbitmq
    environment:
      RABBITMQ_DEFAULT_USER: user
      RABBITMQ_DEFAULT_PASS: password
    ports:
      - "5672:5672"
      - "15672:15672"
    volumes:
      - rabbitmq_data:/var/lib/rabbitmq
    healthcheck:
      test: ["CMD", "rabbitmq-diagnostics", "-q", "ping"]
      interval: 30s
      timeout: 30s
      retries: 3
    networks:
      - assessment-net

  # 3. Infrastructure: MongoDB Database Service
  mongo:
    image: mongo:latest
    container_name: codespace_mongo
    ports:
      - "27017:27017"
    volumes:
      - mongo_data:/data/db
    networks:
      - assessment-net

  # 4. Backend Service: Assessment API
  assessment-api:
    build:
      context: ./assessment-api
      dockerfile: Dockerfile
    container_name: codespace_assessment_api
    command: npm run dev
    ports:
      - "3000:3000"
    volumes:
      - ./assessment-api:/usr/src/app
      - ./contracts:/usr/src/contracts:ro
      - ./judge-service-go:/usr/src/app/judge-service-go:ro
      - /usr/src/app/node_modules
    environment:
      - MONGO_URI=mongodb://mongo:27017/assessment_db
      - PORT=3000
      - REDIS_URI=redis://redis:6379
      - RABBITMQ_URI=amqp://user:password@rabbitmq:5672
      - JWT_SECRET=dev_secret_change_me
    depends_on:
      rabbitmq:
        condition: service_healthy
      redis:
        condition: service_started
      mongo:
        condition: service_started
    networks:
      - assessment-net

  judge-service-go:
    build:
      context: ./judge-service-go
      dockerfile: Dockerfile
    container_name: codespace_judge_service_go
    working_dir: /src
    command: sh -c "go build -o ./tmp/go-judge-service . && ./tmp/go-judge-service"
    group_add:
      - "103"
    volumes:
      - ./judge-service-go:/src
      - /var/run/docker.sock:/var/run/docker.sock # Needed for Docker-in-Docker functionality
      - /tmp:/tmp
    environment:
      - MONGO_URI=mongodb://mongo:27017/assessment_db
      - RABBITMQ_URL=amqp://user:password@rabbitmq:5672
      - REDIS_URI=redis://redis:6379
      - JUDGE_CENTRAL_COMPARE_PY=true
      - JUDGE_CENTRAL_COMPARE_JS=true
      - JUDGE_CENTRAL_COMPARE_JAVA=true
    depends_on:
      rabbitmq:
        condition: service_healthy
      mongo:
        condition: service_started
      redis:
        condition: service_started
    networks:
      - assessment-net

  judge-java:
    build:
      context: ./judge-service-go/environments/java
      dockerfile: Dockerfile
    image: judge-java-env
    pull_policy: build
    container_name: judge_java_env
    networks:
      - assessment-net

  judge-js:
    build:
      context: ./judge-service-go/environments/javascript
      dockerfile: Dockerfile
    image: judge-js-env
    pull_policy: build
    container_name: judge_js_env
    networks:
      - assessment-net

  judge-py:
    build:
      context: ./judge-service-go/environments/python
      dockerfile: Dockerfile
    image: judge-py-env
    pull_policy: build
    container_name: judge_py_env
    networks:
      - assessment-net

  judge-c:
    build:
      context: ./judge-service-go/environments/c
      dockerfile: Dockerfile
    image: judge-c-env
    pull_policy: build
    container_name: judge_c_env
    networks:
      - assessment-net

  judge-csharp:
    build:
      context: ./judge-service-go/environments/csharp
      dockerfile: Dockerfile
    image: judge-csharp-env
    pull_policy: build
    container_name: judge_csharp_env
    networks:
      - assessment-net

  judge-go:
    build:
      context: ./judge-service-go/environments/go
      dockerfile: Dockerfile
    image: judge-go-env
    pull_policy: build
    container_name: judge_go_env
    networks:
      - assessment-net

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: codespace_frontend
    command: npm run dev -- --host 0.0.0.0
    ports:
      - "5173:5173"
    volumes:
      - ./frontend:/usr/src/app
      - /usr/src/app/node_modules
    environment:
      - VITE_API_URL=http://assessment-api:3000

    depends_on:
      - assessment-api
    networks:
      - assessment-net

  harness:
    image: node:20-alpine
    container_name: codespace_submission_harness
    working_dir: /app
    command: ["npm", "run", "test:submission"]
    volumes:
      - .:/app
    environment:
      - API_BASE_URL=http://assessment-api:3000/api
    depends_on:
      - assessment-api
    networks:
      - assessment-net

volumes:
  redis_data:
  rabbitmq_data:
  mongo_data:

networks:
  assessment-net:
