name: Go CI

on:
  push:
    branches:
      - main
      - master
  pull_request:
    branches:
      - '**'

jobs:
  build:
    name: Build & Static Checks
    runs-on: ubuntu-latest
    
    defaults:
      run:
        working-directory: ./judge-service-go

    env:
      GOPROXY: "https://proxy.golang.org,direct"

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v4
        with:
          go-version: "1.25.4"

      - name: Cache Go build and module cache
        uses: actions/cache@v4
        with:
          path: |
            ~/.cache/go-build
            ~/go/pkg/mod
          key: ${{ runner.os }}-go-${{ hashFiles('**/go.sum') }}
          restore-keys: |
            ${{ runner.os }}-go-

      - name: Ensure modules downloaded
        run: |
          go version
          go env
          go mod download

      - name: Tidy modules (no-op if clean)
        run: |
          go mod tidy
          git status --porcelain

      - name: Run go vet
        run: go vet ./...

      - name: Run unit tests
        run: |
          go test ./... -cover

      - name: Install staticcheck
        run: go install honnef.co/go/tools/cmd/staticcheck@v0.7.0

      - name: Run staticcheck
        run: staticcheck ./...

      - name: Install govulncheck
        run: go install golang.org/x/vuln/cmd/govulncheck@v1.3.0

      - name: Run govulncheck (vulnerability scan)
        run: govulncheck ./...

      - name: List outdated modules (informational)
        run: go list -m -u all || true
