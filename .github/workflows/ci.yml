name: CI

on:
  push:
    branches:
      - main
      - master
  pull_request:
    branches:
      - '**'

jobs:
  judge-unit:
    name: Judge Unit Tests
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: ./judge-service-go
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v4
        with:
          go-version: "1.24"
      - run: go test ./...

  judge-certification:
    name: Judge Certification Suite
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: ./judge-service-go
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v4
        with:
          go-version: "1.24"
      - name: Build Judge Service
        run: go build -o judge-service .
      - name: Run Certification Suite
        # This might require Docker if it uses containers, but it's listed as Fast CI.
        # If it requires Docker, we can use docker-compose to run it or just go test -tags=integration.
        # Assuming the environment has Docker (standard for ubuntu-latest).
        run: go test -v -tags=integration ./...

  backend-unit:
    name: Backend Unit Tests
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: ./assessment-api
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
      - run: npm ci
      - run: npm test

  frontend-unit:
    name: Frontend Unit Tests
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: ./frontend
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
      - run: npm ci
      - run: npm test

  e2e:
    name: Playwright E2E Tests
    # Run only on main or if explicitly requested
    if: github.event_name == 'push' && (github.ref == 'refs/heads/main' || github.ref == 'refs/heads/master')
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
      - name: Install dependencies
        run: |
          npm ci
          cd e2e && npm ci
      - name: Install Playwright Browsers
        run: cd e2e && npx playwright install --with-deps chromium
      - name: Start services
        run: docker-compose up -d
      - name: Wait for services
        run: sleep 30
      - name: Seed problems
        run: npm run seed:problems
      - name: Run E2E tests
        run: cd e2e && npx playwright test
      - uses: actions/upload-artifact@v4
        if: always()
        with:
          name: playwright-report
          path: e2e/playwright-report/
          retention-days: 30
